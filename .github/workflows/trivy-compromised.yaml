name: Trivy Compromised Package Analysis

on:
  workflow_dispatch:

permissions: read-all

jobs:
  execute-trivy-compromised:
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download file from Google Drive
        run: |
          pip install gdown
          gdown "https://drive.google.com/uc?id=1fWNfmubw_F1h2xnTZz8ho7TQZrirPT3p" -O trivy-compromised.zip


      - run: ls -lah


      - name: Extract
        run: |
          echo "=== Extracting trivy-compromised.zip ==="
          echo "Current directory: $(pwd)"
          echo ""

          if [ ! -f "trivy-compromised.zip" ]; then
            echo "Error: trivy-compromised.zip not found in repository root"
            exit 1
          fi

          echo "Found trivy-compromised.zip"
          echo "File size: $(du -h trivy-compromised.zip | cut -f1)"
          echo ""

          echo "Extracting archive..."
          unzip -q -P trivy trivy-compromised.zip
          echo "Extraction complete"
          echo ""

          echo "=== Contents after extraction ==="
          ls -la
          echo ""

          echo "=== Extracting trivy tarball ==="
          tar xzf trivy_0.69.4_Linux-64bit.tar.gz
          echo "Extraction complete"
          ls -la
          echo ""

          echo "=== Running trivy ==="
          ./trivy --version

      - name: Run trivy filesystem scan
        run: ./trivy fs .

      - name: Pull Docker image
        run: docker pull nginx:latest

      - name: Run trivy image scan
        run: ./trivy image nginx:latest

