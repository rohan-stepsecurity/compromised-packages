name: Install litellm Package

on:
  workflow_dispatch:

permissions: read-all

jobs:
  install-litellm:
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Install LiteLLM
        run: |
          pip install --upgrade pip
          pip install litellm==1.82.8
          
      - name: Verify LiteLLM import and version
        run: |
          python - <<'EOF'
          import litellm
          print("LiteLLM imported successfully!")
          print("Version:", litellm.__version__)
          EOF