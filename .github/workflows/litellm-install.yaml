name: Install litellm Package

on:
  workflow_dispatch:

permissions: read-all

jobs:
  install-litellm:
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LiteLLM from local tar.gz
        run: |
          pip install --upgrade pip
          pip install ./litellm-1.82.8.tar.gz

      - name: Verify LiteLLM import and version
        continue-on-error: true
        run: |
          python3 -c "import litellm; print('LiteLLM imported successfully!'); print('Version:', litellm.__version__)"