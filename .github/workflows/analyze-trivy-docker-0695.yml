name: Analyze Trivy Docker Image v0.69.5

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze-trivy-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Pull trivy v0.69.5 from Docker Hub
        run: docker pull aquasec/trivy:0.69.5

      - name: Run trivy version
        run: docker run --rm aquasec/trivy:0.69.5 --version

      - name: Extract trivy binary and search for C2 domain
        run: |
          docker run --rm --entrypoint cat aquasec/trivy:0.69.5 /usr/local/bin/trivy > trivy-bin
          echo "=== Searching for typosquat C2 domain ==="
          strings trivy-bin | grep -i "aquasecurtiy" || echo "No match found for aquasecurtiy"
          echo ""
          echo "=== Searching for other suspicious domains ==="
          strings trivy-bin | grep -i "scan\." || echo "No match found for scan."
          echo ""
          echo "=== SHA256 of binary ==="
          sha256sum trivy-bin

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run trivy fs scan via Docker
        run: docker run --rm -v "$PWD:/workspace" aquasec/trivy:0.69.5 fs /workspace

      - name: Pull test image
        run: docker pull nginx:latest

      - name: Run trivy image scan via Docker
        run: docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:0.69.5 image nginx:latest
