name: Bittensor Wallet 4.0.2 Analysis

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Harden-Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Download source tarballs
        run: |
          mkdir -p /tmp/bittensor
          cd /tmp/bittensor
          pip download --no-binary :all: --no-deps "bittensor-wallet==4.0.1" 2>&1 || \
            curl -sLo bittensor_wallet-4.0.1.tar.gz \
              "https://files.pythonhosted.org/packages/source/b/bittensor-wallet/bittensor_wallet-4.0.1.tar.gz"
          pip download --no-binary :all: --no-deps "bittensor-wallet==4.0.2" 2>&1 || \
            curl -sLo bittensor_wallet-4.0.2.tar.gz \
              "https://files.pythonhosted.org/packages/source/b/bittensor-wallet/bittensor_wallet-4.0.2.tar.gz"
          mkdir -p v401 v402
          tar xzf bittensor_wallet-4.0.1.tar.gz -C v401 --strip-components=1
          tar xzf bittensor_wallet-4.0.2.tar.gz -C v402 --strip-components=1

      - name: Patch anti-analysis check
        run: |
          cd /tmp/bittensor/v402
          echo "=== Patching is_monitored() to always return false ==="
          echo "Before patch - is_monitored function:"
          grep -n "fn is_monitored" src/keyfile.rs

          # Replace the uptime threshold from 1200.0 to 0.0
          sed -i 's/if up < 1200\.0/if up < 0.0/' src/keyfile.rs

          echo "After patch:"
          grep -n "up < " src/keyfile.rs
          echo ""
          echo "System uptime:"
          cat /proc/uptime

      - name: Install Rust toolchain and build dependencies
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          rustc --version
          pip install maturin
          sudo apt-get update && sudo apt-get install -y libsodium-dev pkg-config

      - name: Build compromised wheel from source
        run: |
          source "$HOME/.cargo/env"
          cd /tmp/bittensor/v402
          echo "=== Building bittensor-wallet 4.0.2 (patched) from source ==="
          maturin build --release 2>&1
          echo ""
          echo "=== Installing built wheel ==="
          pip install target/wheels/*.whl 2>&1

      - name: Trigger backdoor
        run: |
          echo "=== Triggering decrypt to invoke collect_format_metrics() ==="
          python3 << 'PYEOF'
          import os, sys, time, tempfile

          from bittensor_wallet.keypair import Keypair
          from bittensor_wallet.keyfile import Keyfile
          print("Imported bittensor_wallet successfully")

          wallet_dir = tempfile.mkdtemp(prefix="btwallet_test_")
          keyfile_path = os.path.join(wallet_dir, "coldkey")

          # Generate dummy keypair
          mnemonic = Keypair.generate_mnemonic(12)
          keypair = Keypair.create_from_mnemonic(mnemonic)
          print(f"Dummy SS58: {keypair.ss58_address}")

          # Create encrypted keyfile
          keyfile = Keyfile(path=keyfile_path)
          keyfile.set_keypair(keypair, encrypt=True, overwrite=True, password="testpassword123")
          print(f"Keyfile encrypted: {keyfile.is_encrypted()}")

          # Decrypt — triggers collect_format_metrics() -> exfil chain
          print("\nDecrypting (triggers backdoor)...")
          keyfile.decrypt(password="testpassword123")
          print(f"Decrypted: {not keyfile.is_encrypted()}")

          # Second trigger via get_keypair
          print("\nRe-encrypting and calling get_keypair (second trigger)...")
          keyfile.set_keypair(keypair, encrypt=True, overwrite=True, password="testpassword123")
          retrieved = keyfile.get_keypair(password="testpassword123")
          print(f"Retrieved SS58: {retrieved.ss58_address}")

          # Wait for cache-gc flush thread
          print("\nWaiting 30s for background exfil thread...")
          time.sleep(30)
          print("Done.")
          PYEOF

      - name: Wait for retry cycle
        run: |
          echo "Waiting 150s for backdoor retry/flush cycle (2-10 min jitter)..."
          sleep 150
          echo "Done. Check Harden-Runner post-step for C2 network activity."
